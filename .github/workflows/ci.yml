name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'
          dotnet-quality: 'ga'

      - name: Display .NET version
        run: dotnet --version

      - name: Restore dependencies
        run: dotnet restore FruitSalesCalculator.sln

      - name: Build
        run: dotnet build FruitSalesCalculator.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test FruitSalesCalculator.sln --configuration Release --no-build --verbosity normal
